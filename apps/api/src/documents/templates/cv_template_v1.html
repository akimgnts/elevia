<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{page_title}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --c-primary-dark:#0a2a4a;
  --c-primary:#0f3c68;
  --c-primary-light:#2c5d8f;
  --c-accent:#e0f2fe;
  --c-text-dark:#1e293b;
  --c-text-muted:#64748b;
  --c-white:#ffffff;
  --sidebar-width:33%;
}
*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
body{margin:0;padding:0;background:#555;font-family:'Manrope',sans-serif;color:var(--c-text-dark);font-size:10pt;line-height:1.5;}
.page{width:210mm;height:296.8mm;background:var(--c-white);margin:20px auto;display:flex;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,.5);}
.sidebar{width:var(--sidebar-width);background:var(--c-primary);color:#fff;display:flex;flex-direction:column;padding:35px 25px;gap:22px;height:100%;}
.photo-area{text-align:center;margin-bottom:6px;}
.photo-area img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.2);}
.sidebar-section h3{font-size:11pt;text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid rgba(255,255,255,.3);padding-bottom:8px;margin-bottom:12px;color:var(--c-accent);font-weight:700;}
.contact-list,.lang-list{list-style:none;padding:0;margin:0;}
.contact-list li{margin-bottom:10px;font-size:9pt;display:flex;flex-direction:column;}
.contact-list a{color:#fff;text-decoration:none;font-weight:500;}
.skills-cloud{display:flex;flex-wrap:wrap;gap:8px;}
.skill-tag{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:4px;font-size:8.5pt;font-weight:500;}
.skill-tag.strong{background:#fff;color:var(--c-primary);font-weight:700;}
.main-content{flex:1;padding:40px 40px 30px 40px;display:flex;flex-direction:column;}
.header-main{margin-bottom:18px;border-bottom:2px solid var(--c-accent);padding-bottom:16px;}
.header-main h1{font-size:32pt;text-transform:uppercase;line-height:.9;margin:0 0 5px 0;color:var(--c-primary);font-weight:800;letter-spacing:-1px;}
.header-main h2{font-size:14pt;color:var(--c-primary-light);margin:0;font-weight:500;text-transform:uppercase;letter-spacing:2px;}
.section-title{font-size:12pt;font-weight:700;text-transform:uppercase;color:var(--c-primary);margin:16px 0 10px 0;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';display:block;width:6px;height:6px;background:var(--c-primary);border-radius:50%;}
.profile-intro{font-size:10pt;margin-bottom:12px;text-align:justify;line-height:1.6;}
.job-block{margin-bottom:12px;}
.job-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.job-role{font-weight:800;font-size:11pt;}
.job-date{font-size:9pt;font-weight:600;color:var(--c-primary);background:var(--c-accent);padding:2px 8px;border-radius:10px;}
.job-company{font-size:10pt;font-weight:600;color:var(--c-primary-light);margin-bottom:4px;display:block;}
.job-desc ul{margin:5px 0 0 0;padding-left:18px;}
.job-desc li{margin-bottom:4px;font-size:9.5pt;}
.edu-block{margin-bottom:8px;}
.edu-degree{font-weight:700;font-size:10pt;}
.edu-school{font-style:italic;color:var(--c-text-muted);font-size:9.5pt;}
.micro{margin:0 0 6px 0;font-size:9.2pt;font-style:italic;color:#556273;}
@media print{body{background:none;margin:0;}.page{margin:0;box-shadow:none;page-break-after:auto;}}
</style>
</head>

<body>
<div class="page">

  <aside class="sidebar">
    {{photo_html}}

    <div class="sidebar-section">
      <h3>Contact</h3>
      <ul class="contact-list">
        {{contact_html}}
      </ul>
    </div>

    <div class="sidebar-section">
      <h3>Signal</h3>
      <div class="skills-cloud">
        {{signal_skills_html}}
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Outils</h3>
      <div class="skills-cloud">
        {{tools_html}}
      </div>
    </div>

    <div class="sidebar-section" style="margin-top:auto">
      <h3>Langues</h3>
      <ul class="lang-list">
        {{languages_html}}
      </ul>
    </div>
  </aside>

  <main class="main-content">
    <header class="header-main">
      <h1>{{full_name}}</h1>
      <h2>{{subtitle}}</h2>
    </header>

    <div class="profile-intro">
      {{summary_html}}
    </div>

    <section>
      <div class="section-title">Expérience</div>
      {{experience_html}}
    </section>

    <section>
      <div class="section-title">Formation</div>
      {{education_html}}
    </section>

    <section style="margin-top:10px">
      <div class="section-title">Certifications</div>
      <div style="font-size:9.5pt;">
        {{certifications_html}}
      </div>
    </section>

  </main>
</div>
</body>
</html>
